<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷你都市 - 城市建造经营游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
            user-select: none;
        }

        body {
            background-color: #121214;
            color: #fff;
            overflow: hidden;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 25px;
            background: #1f1f23;
            border-bottom: 2px solid #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .status-group {
            display: flex;
            gap: 25px;
        }

        .status-item {
            padding: 6px 14px;
            background: #2d2d34;
            border-radius: 8px;
            font-size: 15px;
            min-width: 100px;
            text-align: center;
        }

        .happy { color: #4ade80; }
        .danger { color: #f87171; }

        .func-group button {
            padding: 7px 16px;
            margin-left: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .save-btn { background: #3b82f6; color: #fff; }
        .load-btn { background: #8b5cf6; color: #fff; }
        .reset-btn { background: #ef4444; color: #fff; }

        .func-group button:hover { opacity: 0.85; }

        .game-wrap {
            display: flex;
            height: calc(100vh - 64px);
        }

        .build-panel {
            width: 240px;
            background: #1a1a1f;
            padding: 20px 15px;
            border-right: 2px solid #333;
        }

        .panel-title {
            font-size: 20px;
            color: #60a5fa;
            margin-bottom: 18px;
            text-align: center;
            font-weight: bold;
        }

        .build-btn {
            width: 100%;
            padding: 11px;
            margin: 7px 0;
            border: none;
            border-radius: 7px;
            background: #27272a;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            border: 1px solid #444;
        }

        .build-btn:hover {
            background: #38383f;
            border-color: #60a5fa;
        }

        .build-btn.active {
            background: #2563eb;
            border-color: #93c5fd;
        }

        .tip-box {
            margin-top: 25px;
            padding: 12px;
            background: #27272a;
            border-radius: 7px;
            font-size: 12px;
            color: #aaa;
            line-height: 1.6;
        }

        .city-map {
            flex: 1;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(45, 26px);
            grid-template-rows: repeat(28, 26px);
            gap: 2px;
            background: #0f0f12;
            overflow: auto;
        }

        .tile {
            width: 26px;
            height: 26px;
            background: #3f6212;
            border-radius: 3px;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .tile:hover { transform: scale(1.08); }
        .tile.road { background: #52525b; }
        .tile.house { background: #eab308; }
        .tile.factory { background: #dc2626; }
        .tile.park { background: #16a34a; }
        .tile.power { background: #7c3aed; }
        .tile.water { background: #0284c7; }
        .tile.disaster { animation: shake 0.4s infinite; background: #b91c1c; }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
        }

        .msg-popup {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 22px;
            background: rgba(0,0,0,0.85);
            border-radius: 20px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="status-group">
            <div class="status-item">💰 资金：<span id="money">1500</span></div>
            <div class="status-item">👥 人口：<span id="pop">0</span></div>
            <div class="status-item">⚡ 电力：<span id="power">0</span></div>
            <div class="status-item">💧 水源：<span id="water">0</span></div>
            <div class="status-item" id="happyBar">😊 满意度：<span id="happy">80</span>%</div>
            <div class="status-item">💵 每轮税收：<span id="tax">0</span></div>
        </div>
        <div class="func-group">
            <button class="save-btn" onclick="saveGame()">💾 存档</button>
            <button class="load-btn" onclick="loadGame()">📂 读档</button>
            <button class="reset-btn" onclick="resetGame()">🔄 重置城市</button>
        </div>
    </div>

    <div class="game-wrap">
        <div class="build-panel">
            <div class="panel-title">🏗️ 建造菜单</div>
            <button class="build-btn" data-type="road" data-cost="40">🛣️ 道路 (40金币)</button>
            <button class="build-btn" data-type="house" data-cost="180">🏠 居民区 (180金币)</button>
            <button class="build-btn" data-type="factory" data-cost="320">🏭 工业区 (320金币)</button>
            <button class="build-btn" data-type="park" data-cost="120">🌳 公园 (120金币)</button>
            <button class="build-btn" data-type="power" data-cost="450">⚡ 发电厂 (450金币)</button>
            <button class="build-btn" data-type="water" data-cost="380">💧 自来水厂 (380金币)</button>

            <div class="tip-box">
                游戏规则：<br>
                1. 道路必须连通建筑才能生效<br>
                2. 电厂/水厂保障全城基础运转<br>
                3. 公园提升市民满意度<br>
                4. 每10秒自动结算税收<br>
                5. 每30分钟有概率触发灾害
            </div>
        </div>

        <div class="city-map" id="map"></div>
    </div>

    <div class="msg-popup" id="msg"></div>

    <script>
        const gameData = {
            money: 1500,
            population: 0,
            power: 0,
            water: 0,
            happy: 80,
            tax: 0,
            currentBuild: null,
            mapData: []
        };
        let tileList = [];
        const ROW = 28;
        const COL = 45;

        function initMap() {
            const mapDom = document.getElementById('map');
            mapDom.innerHTML = '';
            tileList = [];
            gameData.mapData = [];

            for(let r = 0; r < ROW; r++){
                gameData.mapData[r] = [];
                for(let c = 0; c < COL; c++){
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.dataset.row = r;
                    tile.dataset.col = c;
                    tile.dataset.type = '';
                    mapDom.appendChild(tile);
                    tileList.push(tile);
                    gameData.mapData[r][c] = '';

                    tile.onclick = function(){
                        buildTile(this);
                    };
                }
            }
        }

        const buildBtns = document.querySelectorAll('.build-btn');
        buildBtns.forEach(btn => {
            btn.onclick = function(){
                buildBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                gameData.currentBuild = {
                    type: this.dataset.type,
                    cost: Number(this.dataset.cost)
                };
            };
        });

        function buildTile(tile) {
            const build = gameData.currentBuild;
            if(!build) return showMsg("请先选择建造项目！");

            const r = Number(tile.dataset.row);
            const c = Number(tile.dataset.col);
            const oldType = tile.dataset.type;

            if(oldType) return showMsg("该位置已有建筑！");
            if(gameData.money < build.cost) return showMsg("金币不足！", true);

            gameData.money -= build.cost;
            tile.classList.add(build.type);
            tile.dataset.type = build.type;
            gameData.mapData[r][c] = build.type;

            calcCityEffect();
            updateUI();
        }

        function calcCityEffect() {
            let roadNum = 0, houseNum = 0, factoryNum = 0;
            let parkNum = 0, powerNum = 0, waterNum = 0;

            for(let r = 0; r < ROW; r++){
                for(let c = 0; c < COL; c++){
                    const t = gameData.mapData[r][c];
                    switch(t){
                        case 'road': roadNum++; break;
                        case 'house': houseNum++; break;
                        case 'factory': factoryNum++; break;
                        case 'park': parkNum++; break;
                        case 'power': powerNum++; break;
                        case 'water': waterNum++; break;
                    }
                }
            }

            gameData.power = powerNum * 120;
            gameData.water = waterNum * 120;

            if(gameData.power > 0 && gameData.water > 0 && roadNum > 0){
                gameData.population = houseNum * 12 + factoryNum * 6;
            }else{
                gameData.population = 0;
            }

            let baseHappy = 70;
            baseHappy += parkNum * 4;
            baseHappy -= factoryNum * 2;
            gameData.happy = Math.max(10, Math.min(100, baseHappy));

            gameData.tax = Math.floor(gameData.population * 0.8 + factoryNum * 15);
        }

        setInterval(() => {
            if(gameData.population > 0){
                gameData.money += gameData.tax;
                showMsg(`税收结算：+${gameData.tax} 金币`);
            }
            updateUI();
        }, 10000);

        setInterval(() => {
            const random = Math.random();
            if(random < 0.25){
                const idx = Math.floor(Math.random() * tileList.length);
                const target = tileList[idx];
                const r = Number(target.dataset.row);
                const c = Number(target.dataset.col);
                const type = target.dataset.type;

                if(type && type !== 'road'){
                    target.classList.add('disaster');
                    showMsg("⚠️ 突发灾害，建筑受损！", true);
                    setTimeout(() => {
                        target.className = 'tile';
                        target.dataset.type = '';
                        gameData.mapData[r][c] = '';
                        calcCityEffect();
                        updateUI();
                    }, 1200);
                }
            }
        }, 1800000);

        function updateUI() {
            document.getElementById('money').innerText = gameData.money;
            document.getElementById('pop').innerText = gameData.population;
            document.getElementById('power').innerText = gameData.power;
            document.getElementById('water').innerText = gameData.water;
            document.getElementById('happy').innerText = gameData.happy;
            document.getElementById('tax').innerText = gameData.tax;

            const happyBar = document.getElementById('happyBar');
            if(gameData.happy < 40){
                happyBar.className = 'status-item danger';
            }else{
                happyBar.className = 'status-item happy';
            }
        }

        function showMsg(text, isWarn = false) {
            const msg = document.getElementById('msg');
            msg.innerText = text;
            msg.style.opacity = 1;
            if(isWarn) msg.style.background = 'rgba(220,38,38,0.9)';
            else msg.style.background = 'rgba(0,0,0,0.85)';

            setTimeout(() => {
                msg.style.opacity = 0;
            }, 1800);
        }

        function saveGame() {
            localStorage.setItem('citySave', JSON.stringify(gameData));
            showMsg("✅ 城市存档成功！");
        }

        function loadGame() {
            const save = localStorage.getItem('citySave');
            if(!save) return showMsg("暂无存档记录！", true);

            const oldData = JSON.parse(save);
            Object.assign(gameData, oldData);

            for(let r = 0; r < ROW; r++){
                for(let c = 0; c < COL; c++){
                    const idx = r * COL + c;
                    const t = gameData.mapData[r][c];
                    tileList[idx].className = 'tile';
                    tileList[idx].dataset.type = t;
                    if(t) tileList[idx].classList.add(t);
                }
            }
            updateUI();
            showMsg("✅ 读取存档成功！");
        }

        function resetGame() {
            if(!confirm("确定要清空整个城市，重新开始吗？")) return;
            gameData.money = 1500;
            gameData.population = 0;
            gameData.power = 0;
            gameData.water = 0;
            gameData.happy = 80;
            gameData.tax = 0;
            gameData.currentBuild = null;
            initMap();
            updateUI();
            showMsg("🔄 城市已重置！");
        }

        window.onload = function() {
            initMap();
            updateUI();
        };
    </script>
</body>
</html>
